services:
  redis:
    image: redis:7
    container_name: rate_limiter_redis
    ports:
      - "6379:6379"

  app:
    build:
      context: .
      dockerfile: Dockerfile

    env_file:
      - .env
    depends_on:
      - redis
  
  lb:
    image: nginx:stable-alpine
    container_name: rate-limiter-lb
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app